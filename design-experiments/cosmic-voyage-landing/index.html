<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Instrument Serif', 'serif'],
            body: ['Barlow', 'sans-serif'],

  <style>
    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    body { margin: 0; background: #000; }
  </style>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion: m } = window.Motion;

    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;

    function FadingVideo({ src, className, style, videoStyle }) {
      const videoRef = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);
      const [loaded, setLoaded] = useState(false);

      const fadeTo = (target, duration) => {
        if (rafRef.current) {
          cancelAnimationFrame(rafRef.current);
        }
        const video = videoRef.current;
        if (!video) return;
        
        const startOp = parseFloat(video.style.opacity) || 0;
        const startTime = performance.now();

        const animate = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 2);
          video.style.opacity = startOp + (target - startOp) * eased;

          if (progress < 1) {
            rafRef.current = requestAnimationFrame(animate);
          }
        };
        rafRef.current = requestAnimationFrame(animate);
      };

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const handleLoadedData = () => {
          setLoaded(true);
          video.style.opacity = 0;
          video.play().catch(() => {});
          fadeTo(1, FADE_MS);
        };

        const handleTimeUpdate = () => {
          if (!fadingOutRef.current && video.duration && video.duration - video.currentTime <= FADE_OUT_LEAD && video.duration - video.currentTime > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const handleEnded = () => {
          video.style.opacity = 0;
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        };

        video.addEventListener('loadeddata', handleLoadedData);
        video.addEventListener('timeupdate', handleTimeUpdate);
        video.addEventListener('ended', handleEnded);

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          video.removeEventListener('loadeddata', handleLoadedData);
          video.removeEventListener('timeupdate', handleTimeUpdate);
          video.removeEventListener('ended', handleEnded);
        };
      }, []);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay
          muted
          playsInline
          preload="auto"
          className={className}
          style={{ opacity: 0, ...style, ...videoStyle }}
        />
      );
    }

    function BlurText({ text, className = "" }) {
      const words = text.split(' ');
      
      return (
        <p className={`flex flex-wrap justify-center gap-[0.28em] ${className}`}>
          {words.map((word, i) => (
            <m.span
              key={i}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              whileInView={{ 
                filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                opacity: [0, 0.5, 1],
                y: [50, -5, 0]
              }}
              transition={{ 
                duration: 0.7, 
                times: [0, 0.5, 1],
                ease: [0.25, 0.1, 0.25, 1],
                delay: (i * 100) / 1000 
              }}
              viewport={{ once: true, amount: 0.1 }}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
            >
              {word}
            </m.span>
          ))}
        </p>
      );
    }

    const ArrowUpRight = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M7 17L17 7"/>
        <path d="M7 7h10v10"/>
      </svg>
    );

    const PlayIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="6 4 20 12 6 20 6 4"/>
      </svg>
    );

    const ClockIcon = () => (
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    );

    const GlobeIcon = () => (
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    );

    const Navbar = () => (
      <m.nav
        initial={{ opacity: 0, y: -20 }}
        animate={{ opacity: 1, y: 0 }}
        transition={{ delay: 0.2, duration: 0.8, ease: [0.25, 0.1, 0.25, 1] }}
        className="fixed top-4 left-0 right-0 px-8 md:px-16 z-50 flex items-center justify-between"
      >
        <div className="w-12 h-12 liquid-glass rounded-full flex items-center justify-center">
          <span className="font-heading italic text-white text-xl">a</span>
        </div>
        
        <div className="hidden md:flex items-center gap-1.5">
          <div className="liquid-glass rounded-full px-1.5 py-1.5 flex items-center gap-1">
            {['Home', 'Voyages', 'Worlds', 'Innovation', 'Plan Launch'].map((item, i) => (
              <a key={i} href="#" className="px-3 py-2 text-sm font-medium text-white/90 font-body hover:text-white transition-colors">
                {item}
              </a>
            ))}
          </div>
          <button className="bg-white text-black rounded-full px-4 py-2 text-sm font-medium font-body whitespace-nowrap flex items-center gap-1 ml-2">
            Claim a Spot <ArrowUpRight />
          </button>
        </div>
        
        <div className="w-12 h-12 md:hidden"></div>
      </m.nav>
    );

    const HeroContent = () => (
      <div className="flex-1 flex flex-col items-center justify-center pt-24 px-4">
        <m.div
          initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
          animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
          transition={{ delay: 0.4, duration: 0.8, ease: [0.25, 0.1, 0.25, 1] }}
          className="liquid-glass rounded-full flex items-center gap-2"
        >
          <span className="bg-white text-black px-3 py-1 text-xs font-semibold rounded-full">New</span>
          <span className="text-sm text-white/90 pr-3 font-body">Maiden Crewed Voyage to Mars Arrives 2026</span>
        </m.div>

        <m.div
          initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
          animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
          transition={{ delay: 0.6, duration: 0.8, ease: [0.25, 0.1, 0.25, 1] }}
          className="mt-8"
        >
          <h1 className="text-6xl md:text-7xl lg:text-[5.5rem] font-heading italic text-white leading-[0.8] max-w-2xl text-center tracking-[-4px]">

        </m.div>

        <m.p
          initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
          animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
          transition={{ delay: 0.8, duration: 0.8, ease: [0.25, 0.1, 0.25, 1] }}
          className="mt-4 text-sm md:text-base text-white max-w-2xl font-body font-light leading-tight text-center"
        >
          Discover the universe in ways once unimaginable. Our pioneering vessels and breakthrough engineering bring deep-space exploration within reach—secure and extraordinary.
        </m.p>

        <m.div
          initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
          animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
          transition={{ delay: 1.1, duration: 0.8, ease: [0.25, 0.1, 0.25, 1] }}
          className="flex items-center gap-6 mt-6"
        >
          <button className="liquid-glass-strong rounded-full px-5 py-2.5 text-sm font-medium text-white flex items-center gap-2">
            Start Your Voyage <ArrowUpRight />
          </button>
          <a href="#" className="text-white flex items-center gap-2 text-sm font-body">
            View Liftoff <PlayIcon />
          </a>
        </m.div>

        <m.div
          initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
          animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
          transition={{ delay: 1.3, duration: 0.8, ease: [0.25, 0.1, 0.25, 1] }}
          className="flex items-stretch gap-4 mt-8"
        >
          <div className="liquid-glass p-5 w-[220px] rounded-[1.25rem] flex flex-col">
            <ClockIcon />
            <span className="text-4xl font-heading italic text-white tracking-[-1px] leading-none mt-3">34.5 Min</span>
            <span className="text-xs text-white font-body font-light mt-2">Average Videos Watch Time</span>
          </div>
          <div className="liquid-glass p-5 w-[220px] rounded-[1.25rem] flex flex-col">
            <GlobeIcon />
            <span className="text-4xl font-heading italic text-white tracking-[-1px] leading-none mt-3">2.8B+</span>
            <span className="text-xs text-white font-body font-light mt-2">Users Across the Globe</span>
          </div>
        </m.div>
      </div>
    );

    const Partners = () => (
      <m.div
        initial={{ opacity: 0 }}
        animate={{ opacity: 1 }}
        transition={{ delay: 1.4, duration: 0.8 }}
        className="flex flex-col items-center gap-4 pb-8"
      >
        <div className="liquid-glass rounded-full px-3.5 py-1 text-xs font-medium text-white">
          Collaborating with top aerospace pioneers globally
        </div>
        <div className="flex items-center gap-12 md:gap-16">
          {['Aeon', 'Vela', 'Apex', 'Orbit', 'Zeno'].map((name, i) => (
            <span key={i} className="font-heading italic text-white text-2xl md:text-3xl tracking-tight">{name}</span>
          ))}
        </div>
      </m.div>
    );

    const Hero = () => (
      <section className="relative h-screen w-full overflow-hidden">
        <FadingVideo
          src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4"
          className="absolute left-1/2 top-0 -translate-x-1/2 object-cover object-top z-0"
          style={{ width: '120%', height: '120%' }}
        />
        <div className="relative z-10 flex flex-col min-h-screen">
          <Navbar />
          <HeroContent />
          <Partners />
        </div>
      </section>
    );

    const Card = ({ icon, tags, title, description }) => (
      <div className="liquid-glass rounded-[1.25rem] p-6 min-h-[360px] flex flex-col">
        <div className="flex items-start justify-between gap-4">
          <div className="liquid-glass rounded-[0.75rem] w-11 h-11 flex items-center justify-center">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
              {icon}
            </svg>
          </div>
          <div className="flex flex-wrap justify-end gap-1.5 max-w-[70%]">
            {tags.map((tag, i) => (
              <span key={i} className="liquid-glass rounded-full px-3 py-1 text-[11px] text-white/90 font-body whitespace-nowrap">
                {tag}
              </span>
            ))}
          </div>
        </div>
        <div className="flex-1"></div>
        <div className="mt-6">
          <h3 className="font-heading italic text-white text-3xl md:text-4xl tracking-[-1px] leading-none">{title}</h3>
          <p className="mt-3 text-sm text-white/90 font-body font-light leading-snug max-w-[32ch]">{description}</p>
        </div>
      </div>
    );

    const Capabilities = () => (
      <section className="relative min-h-screen w-full overflow-hidden">
        <FadingVideo
          src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_094631_d30ab262-45ee-4b7d-99f3-5d5848c8ef13.mp4"
          className="absolute inset-0 w-full h-full object-cover z-0"
        />
        <div className="relative z-10 px-8 md:px-16 lg:px-20 pt-24 pb-10 flex flex-col min-h-screen">
          <div className="mb-auto">
            <m.p
              initial={{ opacity: 0, y: 20 }}
              whileInView={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.6 }}
              viewport={{ once: true }}
              className="text-sm font-body text-white/80 mb-6"
            >
              // Capabilities
            </m.p>
            <m.h2
              initial={{ opacity: 0, y: 20 }}
              whileInView={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.6, delay: 0.1 }}
              viewport={{ once: true }}
              className="font-heading italic text-white text-6xl md:text-7xl lg:text-[6rem] leading-[0.9] tracking-[-3px]"
            >
              Production<br/>evolved
            </m.h2>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16">
            <Card
              icon={<path d="M5 21q-.825 0-1.412-.587T3 19V5q0-.825.588-1.412T5 3h14q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21H5Zm1-4h12l-3.75-5-3 4L9 13l-3 4Z"/>}
              tags={['Natural Context', 'Photo Realism', 'Infinite Settings', 'Eco-Vibe']}
              title="AI Scenery"
              description="AI analyzes your product to create indistinguishable natural environments — from Icelandic cliffs to misty forests."
            />
            <Card
              icon={<path d="M4 6.47 5.76 10H20v8H4V6.47M22 4h-4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.89-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4Z"/>}
              tags={['Scale Fast', 'Visual Consistency', 'Time Saver', 'Ready to Post']}
              title="Batch Production"
              description="Style your entire product line in minutes. Create a unified visual identity for catalogues and social media without weeks of retouching."
            />
            <Card
              icon={<path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1Zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7Z"/>}
              tags={['Ray Tracing', 'Physical Shadows', 'Studio Quality', 'Sunlight Sync']}
              title="Smart Lighting"
              description="Automatic lighting and material adjustment. Achieve flawless integration with realistic shadows and sunlight."
            />
          </div>
        </div>
      </section>
    );

    const App = () => (
      <div>
        <Hero />
        <Capabilities />
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
